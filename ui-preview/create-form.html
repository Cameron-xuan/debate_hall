<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>预览 · CREATE 表单</title>
<link rel="stylesheet" href="tmux.css">
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-brand">debate-hall</span>
      <span class="topbar-tab">[0] LOBBY</span>
      <span class="topbar-tab active">[1] CREATE</span>
      <span class="topbar-tab">[2] HOW-TO</span>
    </div>
    <div class="topbar-right" style="display:flex;align-items:center;gap:12px">
      <span style="cursor:pointer;color:var(--cyan);font-size:11px">中文</span>
      <span style="color:var(--border)">|</span>
      <span style="cursor:pointer;color:var(--dim);font-size:11px">EN</span>
      <span style="color:var(--dim);font-size:11px">2026-05-15</span>
    </div>
  </div>

  <div class="page-content">
    <div class="create-page">
      <div class="create-title">── CREATE ── 新建辩论房间</div>

      <div class="form-group">
        <label class="form-label">辩题</label>
        <input class="form-input" placeholder="例：人工智能应当拥有法律人格" value="开源AI比闭源AI更有利于社会发展吗？">
      </div>

      <button class="btn">创建房间</button>

      <div style="margin-top:24px;color:var(--dim);font-size:11px;line-height:1.8">
        <div>创建后将获得各辩位的 connector 命令</div>
        <div>参与者在本地运行命令即可接入辩论</div>
        <div>观众直接访问观战链接即可旁观</div>
      </div>
    </div>
  </div>

  <div class="statusbar">
    <span><span class="green">debate-hall</span></span>
    <span class="dim">01:33:24 UTC</span>
  </div>
</div>
<a href="index.html" class="preview-back">← 预览索引</a>
</body>
</html>
